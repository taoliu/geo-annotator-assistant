# Example configuration for geo-gsm-annotator-agent

versions:
  prompt_version: "v1"
  validator_version: "v1"

parser:
  # Integrate your existing geo-gsm-parser repo here (module import or subprocess wrapper).
  mode: "stub"           # stub | module | subprocess
  module_path: ""        # used if mode=module
  command: ""            # used if mode=subprocess

llm:
  mode: "local_transformers"           # stub | local_transformers
  apply_chat_template: true
  max_new_tokens: 1028
  temperature: 0.0
  top_p: 1.0
  device: "auto"         # auto | cpu | mps
  dtype: "auto"          # auto | float16 | bfloat16 | float32
  model_path: "./llama-3.2-1b-it"
  stop: ["\nCONTEXT:", "\nPREVIOUS_OUTPUT:"]

ontology_chroma_enabled: true
ontology_chroma_db_path: "/Users/ta32852/Documents/Github/rag_ontologies/ontology_chroma_db"
ontology_chroma_collection: "ontology_rag"
ontology_embedding_model_name: "BAAI/bge-base-en-v1.5"
ontology_embedding_normalize: true
ontology_top_k: 20
ontology_sources_by_field:
  tissue_type: "Uberon Ontology"
  disease: "Human Disease Ontology"
  cell_line: "Cellosaurus"
  data_type: "Experimental Factor Ontology"
ontology_thresholds:
  min_confidence_to_accept: 0.80
  max_delta_for_ambiguity: 0.05

rag:
  persist_path: "/path/to/chroma_persist"
  collections:
    EFO: "efo_assay"
    UBERON: "uberon"
    CELLOSAURUS: "cellosaurus"
    DOID: "doid"
    NCIT: "ncit_malignant_neoplasm_descendants"
  k: 10

thresholds:
  data_type: 0.75
  tissue_type: 0.75
  cell_line: 0.80
  disease: 0.75

limits:
  max_repairs_per_field: 2
  max_total_repairs: 6
