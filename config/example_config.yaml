# Example configuration for geo-gsm-annotator-agent

versions:
  prompt_version: "v1"
  validator_version: "v1"

parser:
  # Integrate your existing geo-gsm-parser repo here (module import or subprocess wrapper).
  mode: "stub"           # stub | module | subprocess
  module_path: ""        # used if mode=module
  command: ""            # used if mode=subprocess

llm:
  transport: "stub"      # stub | local_transformers | openai_http | llama_cpp_http
  apply_chat_template: true
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  device: "auto"         # auto | cpu | mps
  dtype: "auto"          # auto | float16 | bfloat16 | float32
  model_path: "./llama-3.2-1b-it"
  stop: []
  # Example OpenAI-style HTTP transport:
  # transport: "openai_http"
  # openai_http:
  #   base_url: "http://localhost:8000"
  #   model: "gpt-4o-mini"
  #   timeout_s: 30
  #   endpoint: "chat_completions"
  #   default_max_tokens: 256

llm_cache:
  enabled: false

rag:
  persist_path: "ontology_chroma_db"
  collection_name: "ontology_rag"
  k: 20
  ontology:
    enabled: false        # disabled by default for tests
    canonicalize_terminal_exact_labels: false
    lock_terminal_exact_fields: false
    disease:
      ncit_fallback:
        enabled: true
        trigger_terms:
          - cancer
          - tumor
          - tumour
          - carcinoma
          - adenocarcinoma
          - sarcoma
          - neoplasm
          - malignan
          - metastat
          - leukemia
          - lymphoma
          - myeloma
          - glioma
          - glioblastoma
          - melanoma
          - mesothelioma
          - blastoma
    data_type:
      fallback_allowlist_enabled: false
      fallback_allowlist:
        - Microarray
    embedding:
      provider: "langchain_huggingface"
      model_name: "BAAI/bge-base-en-v1.5"
      device: "cpu"
      normalize_embeddings: true
    sources_by_field:
      tissue_type: "Uberon Ontology"
      disease: "Human Disease Ontology"
      cell_line: "Cellosaurus"
      data_type: "Experimental Factor Ontology"
    thresholds:
      min_confidence_to_accept: 0.80
      max_delta_for_ambiguity: 0.05

ingest:
  geo_soft_local_dir: null
  geo_soft_on_missing: "remote"
  geo_soft_remote_transport: "https"

paths:
  soft_cache_dir: null
  overrides_path: null

postpass:
  gse_consistency:
    enabled: true
    fields: ["data_type","organism","tissue_type","cell_line","disease"]
    ignore_values: ["Unknown","None","No","Healthy"]
    outlier_min_samples: 5
    outlier_min_dominant_fraction: 0.80
  suggestions:
    enabled: false
    fields: ["data_type","organism","tissue_type","cell_line","disease","treatment"]
    majority_fraction: 0.80
    support_fraction_precision: 3

thresholds:
  data_type: 0.75
  tissue_type: 0.75
  cell_line: 0.80
  disease: 0.75

limits:
  max_repairs_per_field: 2
  max_format_repairs: 2
  max_total_repairs: 5
  format_salvage_max_chars: 512
  field_word_limits:
    treatment: 0
