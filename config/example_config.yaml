# Example configuration for geo-gsm-annotator-agent

versions:
  prompt_version: "v1"
  validator_version: "v1"

parser:
  # Integrate your existing geo-gsm-parser repo here (module import or subprocess wrapper).
  mode: "stub"           # stub | module | subprocess
  module_path: ""        # used if mode=module
  command: ""            # used if mode=subprocess

llm:
  mode: "stub"           # stub | local_transformers
  apply_chat_template: true
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  device: "auto"         # auto | cpu | mps
  dtype: "auto"          # auto | float16 | bfloat16 | float32
  model_path: "./llama-3.2-1b-it"
  stop: []

rag:
  persist_path: "/path/to/chroma_persist"
  collections:
    EFO: "efo_assay"
    UBERON: "uberon"
    CELLOSAURUS: "cellosaurus"
    DOID: "doid"
    NCIT: "ncit_malignant_neoplasm_descendants"
  k: 10

thresholds:
  data_type: 0.75
  tissue_type: 0.75
  cell_line: 0.80
  disease: 0.75

limits:
  max_repairs_per_field: 2
  max_total_repairs: 6
